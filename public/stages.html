<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WireVerse — Learning Path</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&family=Share+Tech+Mono&display=swap');

    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --y:#00d4ff;--g:#22c55e;--r:#ef4444;--gold:#f59e0b;
      --dark:#060a14;--panel:rgba(4,8,20,.96);--border:rgba(0,212,255,.18)
    }
    html,body{height:100%;overflow:hidden;background:var(--dark)}
    body{font-family:'Barlow',sans-serif;color:#fff}

    /* ── LAYOUT ── */
    #app{display:flex;flex-direction:column;height:100vh}

    /* ── HEADER ── */
    #hdr{
      flex-shrink:0;height:52px;
      background:rgba(4,8,20,.98);
      border-bottom:1px solid var(--border);
      display:flex;align-items:center;padding:0 14px;gap:10px
    }
    .hdr-back{
      background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.28);
      color:var(--y);font-family:'Barlow Condensed',sans-serif;
      font-size:12px;font-weight:700;letter-spacing:.1em;
      padding:7px 12px;border-radius:8px;cursor:pointer;
      text-decoration:none;transition:all .15s;white-space:nowrap
    }
    .hdr-back:active{transform:scale(.93)}
    .hdr-c{flex:1;text-align:center}
    .hdr-title{
      font-family:'Barlow Condensed',sans-serif;font-size:18px;
      font-weight:900;letter-spacing:.3em;color:#fff
    }
    .hdr-sub{font-size:8px;letter-spacing:.2em;color:rgba(0,212,255,.4)}
    .hdr-pct{
      font-family:'Share Tech Mono',monospace;font-size:13px;font-weight:700;
      color:var(--y);background:rgba(0,212,255,.08);
      border:1px solid rgba(0,212,255,.22);border-radius:6px;padding:5px 10px
    }

    /* ── MAIN ── */
    #main{flex:1;display:flex;overflow:hidden;min-height:0}

    /* ── STAGE STRIP ── */
    #stage-area{
      flex:1;display:flex;flex-direction:column;overflow:hidden;
      padding:12px 0 12px 12px
    }
    .journey-lbl{
      font-family:'Barlow Condensed',sans-serif;font-size:8px;font-weight:800;
      letter-spacing:.28em;color:rgba(255,255,255,.25);
      display:flex;align-items:center;gap:8px;
      margin-bottom:10px;padding-right:12px
    }
    .journey-lbl::before,.journey-lbl::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.07)}
    #stage-scroll{
      flex:1;display:flex;align-items:stretch;
      overflow-x:auto;overflow-y:hidden;
      gap:0;padding-bottom:4px;
      -webkit-overflow-scrolling:touch;scrollbar-width:none
    }
    #stage-scroll::-webkit-scrollbar{display:none}

    /* ── ARROW ── */
    .stage-arrow{
      flex-shrink:0;width:24px;display:flex;align-items:center;justify-content:center;
      color:rgba(255,255,255,.16)
    }
    .stage-arrow svg{width:14px;height:14px;flex-shrink:0}

    /* ── STAGE CARD ── */
    .scard{
      flex-shrink:0;width:190px;
      background:rgba(6,12,26,.95);border:1px solid rgba(255,255,255,.08);
      border-radius:14px;overflow:hidden;
      display:flex;flex-direction:column;
      cursor:pointer;transition:transform .15s,border-color .15s,box-shadow .15s;
      position:relative
    }
    .scard:not(.locked):hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.55)}
    .scard:not(.locked):active{transform:scale(.97)}
    .scard.locked{opacity:.48;cursor:not-allowed}
    .scard.s-done{border-color:rgba(34,197,94,.22)}
    .scard.s-active{border-color:rgba(0,212,255,.42);box-shadow:0 0 18px rgba(0,212,255,.1)}

    /* Image band */
    .card-img{
      height:82px;display:flex;align-items:center;justify-content:center;
      position:relative;overflow:hidden;flex-shrink:0
    }
    .img-bg{position:absolute;inset:0}
    .img-num{
      position:absolute;top:8px;left:10px;z-index:2;
      font-family:'Barlow Condensed',sans-serif;font-size:8px;font-weight:800;
      letter-spacing:.2em;background:rgba(0,0,0,.55);
      border-radius:4px;padding:2px 7px
    }
    .img-badge{
      position:absolute;top:8px;right:10px;z-index:2;
      font-family:'Barlow Condensed',sans-serif;font-size:7px;font-weight:800;
      letter-spacing:.12em;padding:2px 7px;border-radius:4px
    }
    .b-done{background:rgba(34,197,94,.2);border:1px solid rgba(34,197,94,.5);color:#4ade80}
    .b-prog{background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.5);color:#fcd34d}
    .b-avail{background:rgba(0,212,255,.12);border:1px solid rgba(0,212,255,.4);color:var(--y)}
    .b-lock{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.28)}

    /* Card body */
    .card-body{flex:1;padding:10px 12px 8px;display:flex;flex-direction:column;gap:4px}
    .card-title{
      font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:900;
      letter-spacing:.04em;color:#fff;line-height:1.15
    }
    .card-desc{font-size:10px;color:rgba(255,255,255,.42);line-height:1.5;flex:1}

    /* Action button */
    .card-btn{
      margin:0 10px 10px;padding:8px;border-radius:8px;border:none;
      font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;
      letter-spacing:.1em;cursor:pointer;transition:all .15s;display:flex;
      align-items:center;justify-content:center;gap:5px
    }
    .card-btn:active:not(:disabled){transform:scale(.96)}
    .btn-done{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.35);color:#4ade80}
    .btn-start{background:linear-gradient(135deg,var(--y),#0088cc);color:#000}
    .btn-cont{background:linear-gradient(135deg,var(--gold),#d97706);color:#000}
    .btn-lock{background:rgba(255,255,255,.04);color:rgba(255,255,255,.2);
      border:1px solid rgba(255,255,255,.07);pointer-events:none}

    /* ── RIGHT PANEL ── */
    #rpanel{
      flex-shrink:0;width:216px;
      display:flex;flex-direction:column;gap:10px;
      padding:12px 12px 12px 0;overflow:hidden
    }
    .rp-card{
      background:rgba(6,12,26,.95);border:1px solid rgba(255,255,255,.08);
      border-radius:14px;padding:13px 14px;flex-shrink:0
    }
    .rp-lbl{
      font-family:'Barlow Condensed',sans-serif;font-size:8px;font-weight:800;
      letter-spacing:.25em;color:var(--y);text-transform:uppercase;margin-bottom:11px
    }

    /* Circular progress */
    .circ-row{display:flex;align-items:center;gap:11px;margin-bottom:11px}
    .circ-wrap{position:relative;width:60px;height:60px;flex-shrink:0}
    .circ-wrap svg{transform:rotate(-90deg)}
    .circ-bg{fill:none;stroke:rgba(255,255,255,.07);stroke-width:5.5}
    .circ-fill{fill:none;stroke:var(--y);stroke-width:5.5;stroke-linecap:round;
      transition:stroke-dashoffset .7s ease}
    .circ-txt{
      position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
      font-family:'Share Tech Mono',monospace;font-size:13px;font-weight:700;color:var(--y)
    }
    .circ-info{flex:1}
    .circ-head{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;color:#fff}
    .circ-sub{font-size:9.5px;color:rgba(255,255,255,.38);margin-top:2px;line-height:1.4}

    /* Checklist */
    .chk-item{
      display:flex;align-items:center;gap:6px;
      padding:4px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:10.5px
    }
    .chk-item:last-child{border-bottom:none}
    .chk-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
    .d-done{background:var(--g)}
    .d-active{background:var(--y);animation:dp 1s infinite}
    .d-lock{background:rgba(255,255,255,.14)}
    @keyframes dp{0%,100%{opacity:1}50%{opacity:.25}}
    .chk-name{flex:1;color:rgba(255,255,255,.6)}
    .chk-name.done{color:rgba(255,255,255,.3);text-decoration:line-through}
    .chk-name.active{color:#fff}
    .chk-tick{font-size:9px;color:var(--g)}

    /* PH wire reference */
    .ph-row{display:flex;align-items:center;gap:7px;margin-bottom:5px;font-size:10px}
    .ph-row:last-of-type{margin-bottom:0}
    .ph-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
    .ph-n{color:rgba(255,255,255,.7);flex:1}
    .ph-w{font-size:8.5px;color:rgba(255,255,255,.28)}
    .ph-note{margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.06);
      font-size:8.5px;color:rgba(255,255,255,.25);line-height:1.5}

    /* ── INFO MODAL ── */
    .info-modal{
      position:fixed;inset:0;background:rgba(0,0,0,.84);z-index:200;
      display:flex;align-items:center;justify-content:center
    }
    .info-box{
      background:rgba(4,8,20,.98);border:1.5px solid rgba(0,212,255,.28);
      border-radius:14px;padding:22px 26px;max-width:430px;width:90%;
      box-shadow:0 14px 52px rgba(0,0,0,.7)
    }
    .info-stage-lbl{
      font-family:'Barlow Condensed',sans-serif;font-size:8px;font-weight:800;
      letter-spacing:.25em;color:var(--y);margin-bottom:8px
    }
    .info-title{
      font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;
      letter-spacing:.06em;color:#fff;margin-bottom:13px
    }
    .info-body{font-size:12.5px;color:rgba(255,255,255,.68);line-height:1.75}
    .info-done-btn{
      margin-top:16px;width:100%;padding:11px;border-radius:8px;
      background:linear-gradient(135deg,var(--y),#0088cc);color:#000;
      font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:900;
      letter-spacing:.1em;border:none;cursor:pointer;transition:opacity .15s
    }
    .info-done-btn:active{opacity:.85}
    .info-close-btn{
      margin-top:7px;width:100%;padding:8px;border-radius:8px;
      background:transparent;color:rgba(255,255,255,.3);
      font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
      letter-spacing:.08em;border:1px solid rgba(255,255,255,.1);cursor:pointer
    }

    /* ── SIM OVERLAY ── */
    #sim-wrap{
      position:fixed;inset:0;background:#060a14;z-index:100;
      display:none;flex-direction:column
    }
    #sim-wrap.show{display:flex}
    #sim-bar{
      flex-shrink:0;height:44px;background:rgba(4,8,20,.98);
      border-bottom:1px solid rgba(0,212,255,.18);
      display:flex;align-items:center;padding:0 12px;gap:10px
    }
    #sim-close-btn{
      background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.35);
      color:#f87171;font-family:'Barlow Condensed',sans-serif;
      font-size:11px;font-weight:700;letter-spacing:.1em;
      padding:6px 11px;border-radius:6px;cursor:pointer
    }
    #sim-lbl{
      flex:1;text-align:center;
      font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;
      letter-spacing:.18em;color:rgba(255,255,255,.6)
    }
    #sim-frame{flex:1;border:none;background:var(--dark);width:100%}
  </style>
</head>
<body>
<div id="app">

  <header id="hdr">
    <a class="hdr-back" href="index.html">← MENU</a>
    <div class="hdr-c">
      <div class="hdr-title">⚡ WIREVERSE</div>
      <div class="hdr-sub">LEARNING PATH</div>
    </div>
    <div class="hdr-pct" id="hdr-pct">0%</div>
  </header>

  <div id="main">

    <div id="stage-area">
      <div class="journey-lbl">YOUR JOURNEY TO BECOME A CERTIFIED ELECTRICIAN</div>
      <div id="stage-scroll"></div>
    </div>

    <div id="rpanel">
      <div class="rp-card">
        <div class="rp-lbl">YOUR PROGRESS</div>
        <div class="circ-row">
          <div class="circ-wrap">
            <svg width="60" height="60" viewBox="0 0 60 60">
              <circle class="circ-bg" cx="30" cy="30" r="25"/>
              <circle class="circ-fill" id="circ-fill" cx="30" cy="30" r="25"
                stroke-dasharray="157.1" stroke-dashoffset="157.1"/>
            </svg>
            <div class="circ-txt" id="circ-pct">0%</div>
          </div>
          <div class="circ-info">
            <div class="circ-head" id="circ-head">Just Started</div>
            <div class="circ-sub" id="circ-sub">0 of 6 stages done</div>
          </div>
        </div>
        <div id="checklist"></div>
      </div>

      <div class="rp-card">
        <div class="rp-lbl">PH WIRE COLORS (PEC 2017)</div>
        <div class="ph-row"><div class="ph-dot" style="background:#ef4444"></div><div class="ph-n">Red — Line (Hot)</div><div class="ph-w">From MCB</div></div>
        <div class="ph-row"><div class="ph-dot" style="background:#3b82f6"></div><div class="ph-n">Blue — Neutral</div><div class="ph-w">Return</div></div>
        <div class="ph-row"><div class="ph-dot" style="background:#22c55e"></div><div class="ph-n">Green — Ground/Earth</div><div class="ph-w">Safety</div></div>
        <div class="ph-note">TYPE A OUTLET — 220V AC / 60Hz<br>MERALCO grid · PEC 2017</div>
      </div>
    </div>

  </div>
</div>

<!-- Simulation iframe overlay -->
<div id="sim-wrap">
  <div id="sim-bar">
    <button id="sim-close-btn" onclick="closeSim()">✕ EXIT</button>
    <div id="sim-lbl"></div>
    <div style="width:72px"></div>
  </div>
  <iframe id="sim-frame" src="" allow="fullscreen"></iframe>
</div>

<script>
// ── DATA ────────────────────────────────────────────────────────────────────
const STAGES = [
  {
    id: 1,
    title: 'UNDERSTAND\nTHE BASICS',
    short: 'The Basics',
    desc: 'Learn what wires are, their types, colors, and basic functions.',
    icon: 'wire',
    file: null,
    color: '#00d4ff',
  },
  {
    id: 2,
    title: 'LEARN\nTHE TOOLS',
    short: 'The Tools',
    desc: 'Get familiar with electrical tools and their proper use.',
    icon: 'tools',
    file: null,
    color: '#f59e0b',
  },
  {
    id: 3,
    title: 'WIRE\nSTRIPPING',
    short: 'Wire Stripping',
    desc: 'Wire a single-pole switch connecting Line to Load step by step.',
    icon: 'switch',
    file: 'learn-outlet-3.html',
    color: '#22c55e',
  },
  {
    id: 4,
    title: 'BASIC\nCONNECTIONS',
    short: 'Basic Connections',
    desc: 'Identify faults, fix, and test a broken electrical outlet.',
    icon: 'outlet',
    file: 'learn-outlet.html',
    color: '#ef4444',
  },
  {
    id: 5,
    title: 'SCENARIO\nCHALLENGES',
    short: 'Switch Install',
    desc: 'Full Philippine switch installation: from breaker off to live test.',
    icon: 'install',
    file: 'switch_installation.html',
    color: '#3b82f6',
  },
  {
    id: 6,
    title: 'ADVANCED\nMASTERY',
    short: 'Advanced Mastery',
    desc: 'Master 1-way, 2-way, and 3-way switch circuit wiring.',
    icon: 'trophy',
    file: 'ways.html',
    color: '#f59e0b',
  },
];

// Info content for stages without simulation files
const INFO = {
  1: {
    title: 'UNDERSTANDING WIRES',
    body: `Electrical wires carry current between a power source and a load.\n\n<strong style="color:#ef4444">Red = Line (Hot)</strong> — carries current from the circuit breaker\n<strong style="color:#3b82f6">Blue = Neutral</strong> — return path, completes the circuit\n<strong style="color:#22c55e">Green = Ground/Earth</strong> — safety, fault protection\n\nPEC 2017 (Philippine Electrical Code) defines these colors. Always follow the code to prevent shock and fire.`
  },
  2: {
    title: 'ELECTRICAL TOOLS',
    body: `<strong style="color:#00d4ff">Screwdriver</strong> — tighten terminal screws and mount covers\n<strong style="color:#00d4ff">Linesman Pliers</strong> — cut, strip, and bend wires\n<strong style="color:#00d4ff">Wire Stripper</strong> — remove insulation without cutting the copper\n<strong style="color:#00d4ff">Multimeter</strong> — measure voltage (set to VAC for 220V)\n<strong style="color:#00d4ff">Voltage Tester</strong> — confirm a wire is de-energized before touching\n\n<strong style="color:#ef4444">Always de-energize the circuit at the MCB before working!</strong>`
  },
};

// ── STORAGE ──────────────────────────────────────────────────────────────────
function getProgress() {
  try { return JSON.parse(localStorage.getItem('wv2_stages') || '{}'); } catch(e) { return {}; }
}
function isDone(id) { return !!getProgress()['s' + id]; }
function isUnlocked(id) { return id === 1 || isDone(id - 1); }
function setDone(id) {
  const p = getProgress(); p['s' + id] = true;
  localStorage.setItem('wv2_stages', JSON.stringify(p));
  render();
}
function getActiveId() {
  for (const s of STAGES) { if (!isDone(s.id) && isUnlocked(s.id)) return s.id; }
  return null;
}

// ── SVG ICONS ────────────────────────────────────────────────────────────────
function icon(type, col) {
  const s = `stroke="${col}" stroke-width="1.5"`;
  switch(type) {
    case 'wire':    return `<svg width="46" height="46" viewBox="0 0 24 24" fill="none" ${s}><path d="M2 12h4l3-7 4 14 3-7h6"/></svg>`;
    case 'tools':   return `<svg width="46" height="46" viewBox="0 0 24 24" fill="none" ${s}><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>`;
    case 'switch':  return `<svg width="46" height="46" viewBox="0 0 24 24" fill="none" ${s}><rect x="2" y="7" width="20" height="10" rx="5"/><circle cx="17" cy="12" r="3" fill="${col}" opacity=".35"/></svg>`;
    case 'outlet':  return `<svg width="46" height="46" viewBox="0 0 24 24" fill="none" ${s}><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="9" y2="12"/><line x1="15" y1="9" x2="15" y2="12"/><path d="M9 15h6"/></svg>`;
    case 'install': return `<svg width="46" height="46" viewBox="0 0 24 24" fill="none" ${s}><polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>`;
    case 'trophy':  return `<svg width="46" height="46" viewBox="0 0 24 24" fill="none" ${s}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/></svg>`;
    default:        return '';
  }
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const doneCount = STAGES.filter(s => isDone(s.id)).length;
  const pct       = Math.round((doneCount / STAGES.length) * 100);
  const activeId  = getActiveId();

  // Header badge
  document.getElementById('hdr-pct').textContent = pct + '%';

  // Circular gauge  (r=25, circumference = 2π×25 ≈ 157.08)
  const C = 2 * Math.PI * 25;
  document.getElementById('circ-fill').style.strokeDashoffset = C - (pct / 100) * C;
  document.getElementById('circ-pct').textContent = pct + '%';
  const HEADS = ['Just Started','Keep Going!','Good Progress','Half Way!','Almost Done!','Almost Done!','Complete! 🎉'];
  document.getElementById('circ-head').textContent = HEADS[doneCount] || 'Complete!';
  document.getElementById('circ-sub').textContent = doneCount === STAGES.length
    ? 'All stages complete!'
    : `${doneCount} of ${STAGES.length} stages done`;

  // Stage cards
  const scroll = document.getElementById('stage-scroll');
  let html = '';
  STAGES.forEach((s, i) => {
    const done      = isDone(s.id);
    const unlocked  = isUnlocked(s.id);
    const isActive  = s.id === activeId;
    const locked    = !unlocked;
    const col       = s.color;

    const badgeCls  = done ? 'b-done' : isActive ? 'b-prog' : unlocked ? 'b-avail' : 'b-lock';
    const badgeTxt  = done ? 'COMPLETED' : isActive ? 'IN PROGRESS' : unlocked ? 'AVAILABLE' : 'LOCKED';
    const cardCls   = `scard ${done ? 's-done' : isActive ? 's-active' : locked ? 'locked' : ''}`;
    const btnCls    = done ? 'btn-done' : isActive ? 'btn-cont' : unlocked ? 'btn-start' : 'btn-lock';
    const btnTxt    = done ? '✓  REVIEW' : isActive ? 'CONTINUE →' : unlocked ? 'START →' : '🔒  LOCKED';

    const titleHtml = s.title.split('\n').join('<br>');

    html += `
    <div class="${cardCls}" data-id="${s.id}" onclick="${locked ? 'void(0)' : `launchStage(${s.id})`}">
      <div class="card-img">
        <div class="img-bg" style="background:linear-gradient(135deg,${col}28,${col}0a)"></div>
        <div class="img-num" style="color:${col}">STAGE ${s.id}</div>
        <div class="img-badge ${badgeCls}">${badgeTxt}</div>
        ${icon(s.icon, col)}
      </div>
      <div class="card-body">
        <div class="card-title">${titleHtml}</div>
        <div class="card-desc">${s.desc}</div>
      </div>
      <button class="card-btn ${btnCls}" ${locked ? 'disabled' : ''}>${btnTxt}</button>
    </div>`;

    if (i < STAGES.length - 1) {
      html += `<div class="stage-arrow">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </div>`;
    }
  });
  scroll.innerHTML = html;

  // Checklist
  let cl = '';
  STAGES.forEach(s => {
    const done     = isDone(s.id);
    const unlocked = isUnlocked(s.id);
    const isActive = s.id === activeId;
    const dotCls   = done ? 'd-done' : isActive ? 'd-active' : 'd-lock';
    const nameCls  = done ? 'done' : isActive ? 'active' : '';
    cl += `
    <div class="chk-item">
      <div class="chk-dot ${dotCls}"></div>
      <div class="chk-name ${nameCls}">${s.id}. ${s.short}</div>
      ${done ? '<div class="chk-tick">✓</div>' : ''}
    </div>`;
  });
  document.getElementById('checklist').innerHTML = cl;
}

// ── INFO MODAL ───────────────────────────────────────────────────────────────
function showInfo(id) {
  const d = INFO[id]; if (!d) return;
  const m = document.createElement('div');
  m.className = 'info-modal';
  m.innerHTML = `
    <div class="info-box">
      <div class="info-stage-lbl">STAGE ${id} OF ${STAGES.length}</div>
      <div class="info-title">${d.title}</div>
      <div class="info-body">${d.body.replace(/\n/g,'<br>')}</div>
      <button class="info-done-btn" onclick="markDone(${id})">MARK AS COMPLETE ✓</button>
      <button class="info-close-btn" onclick="this.closest('.info-modal').remove()">CLOSE</button>
    </div>`;
  document.body.appendChild(m);
}

function markDone(id) {
  document.querySelectorAll('.info-modal').forEach(el => el.remove());
  setDone(id);
  setTimeout(scrollActive, 300);
}

// ── SIM LAUNCHER ─────────────────────────────────────────────────────────────
let activeStageId = null;

function launchStage(id) {
  const s = STAGES.find(x => x.id === id); if (!s) return;
  if (!s.file) { showInfo(id); return; }
  activeStageId = id;
  document.getElementById('sim-lbl').textContent = s.title.replace('\n', ' ');
  document.getElementById('sim-frame').src = s.file;
  document.getElementById('sim-wrap').classList.add('show');
}

function closeSim() {
  document.getElementById('sim-wrap').classList.remove('show');
  document.getElementById('sim-frame').src = '';
  activeStageId = null;
}

window.addEventListener('message', e => {
  if (!e.data) return;
  if (e.data.type === 'complete' && activeStageId) {
    setDone(activeStageId);
    closeSim();
    setTimeout(scrollActive, 400);
  }
  if (e.data.type === 'back') closeSim();
});

// ── SCROLL TO ACTIVE ─────────────────────────────────────────────────────────
function scrollActive() {
  const id = getActiveId(); if (!id) return;
  const el = document.querySelector(`[data-id="${id}"]`);
  if (el) el.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
}

// ── INIT ─────────────────────────────────────────────────────────────────────
render();
setTimeout(scrollActive, 150);
</script>
</body>
</html>
