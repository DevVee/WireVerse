<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Electrical Technician Simulator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Courier New', monospace;
      background: #0a0f14;
      color: #ffffff;
      overflow: hidden;
      touch-action: none;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    #overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #0a1a2a 0%, #1a2a3a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    #overlay h1 {
      font-size: clamp(24px, 5vw, 48px);
      color: #44ff88;
      text-shadow: 0 0 20px #44ff8844;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    #overlay p {
      color: #aaccdd;
      font-size: clamp(12px, 2vw, 16px);
      margin-bottom: 30px;
      text-align: center;
      padding: 0 20px;
    }

    #startBtn {
      padding: 15px 40px;
      font-size: clamp(14px, 2.5vw, 20px);
      font-family: inherit;
      background: linear-gradient(135deg, #44ff88 0%, #22dd66 100%);
      color: #0a1a2a;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      letter-spacing: 1px;
      transition: all 0.3s;
      box-shadow: 0 4px 20px #44ff8844;
    }

    #startBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 30px #44ff8866;
    }

    #startBtn:active {
      transform: translateY(0);
    }

    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      display: none;
      z-index: 10;
    }

    #topBar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      background: linear-gradient(180deg, rgba(10, 15, 20, 0.95) 0%, rgba(10, 15, 20, 0) 100%);
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .status-group {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .status-item {
      font-size: 11px;
      background: rgba(20, 30, 40, 0.8);
      padding: 6px 12px;
      border-radius: 4px;
      border-left: 3px solid #44ff88;
    }

    .status-item label {
      color: #8899aa;
      margin-right: 6px;
    }

    #roomname {
      font-size: 16px;
      font-weight: bold;
      color: #44ff88;
      text-shadow: 0 0 10px #44ff8844;
    }

    #genStatus {
      background: rgba(20, 30, 40, 0.9);
      padding: 8px 12px;
      border-radius: 4px;
      border: 1px solid #3a5a4a;
      font-size: 11px;
    }

    #minimap {
      position: absolute;
      bottom: 24px;
      right: 24px;
      width: 140px;
      height: 140px;
      border: 2px solid #446644;
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8);
      background: rgba(10, 15, 20, 0.95);
      z-index: 15;
      overflow: hidden;
    }

    #taskPanel {
      position: absolute;
      top: 80px;
      right: 20px;
      width: 280px;
      max-height: 400px;
      background: rgba(15, 20, 30, 0.95);
      border: 2px solid #3a5a6a;
      border-radius: 8px;
      padding: 12px;
      display: none;
      overflow-y: auto;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
      pointer-events: all;
    }

    #taskPanel h3 {
      color: #44ff88;
      font-size: 14px;
      margin-bottom: 10px;
      border-bottom: 1px solid #3a5a6a;
      padding-bottom: 8px;
    }

    #taskList {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .task-item:hover {
      background: rgba(60, 80, 100, 0.5) !important;
    }

    #notification {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(20, 30, 40, 0.95);
      color: #ffffff;
      padding: 15px 30px;
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
      border: 2px solid #44ff88;
      box-shadow: 0 4px 30px rgba(68, 255, 136, 0.3);
      display: none;
      max-width: 90vw;
      z-index: 100;
    }

    #prompt {
      position: absolute;
      bottom: 140px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(68, 255, 136, 0.95);
      color: #0a1a2a;
      padding: 12px 24px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: bold;
      display: none;
      box-shadow: 0 4px 20px rgba(68, 255, 136, 0.5);
      animation: pulse 1.5s infinite;
      z-index: 20;
    }

    @keyframes pulse {

      0%,
      100% {
        transform: translateX(-50%) scale(1);
      }

      50% {
        transform: translateX(-50%) scale(1.05);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translate(-50%, -40%);
      }

      to {
        opacity: 1;
        transform: translate(-50%, -50%);
      }
    }

    #fpsCounter {
      position: absolute;
      top: 15px;
      right: 220px;
      font-size: 11px;
      color: #6a9aaa;
      background: rgba(20, 30, 40, 0.8);
      padding: 6px 12px;
      border-radius: 4px;
    }

    #ptrMsg {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #8899aa;
      font-size: 11px;
      display: none;
      text-align: center;
      z-index: 20;
    }

    #controls {
      position: fixed;
      bottom: 20px;
      left: 20px;
      display: none;
      pointer-events: all;
      z-index: 50;
    }

    @media (min-width: 768px) {
      #controls {
        display: none !important;
      }
    }

    .control-pad {
      display: flex;
      gap: 10px;
    }

    .control-btn {
      width: 60px;
      height: 60px;
      background: rgba(68, 255, 136, 0.2);
      border: 2px solid #44ff88;
      border-radius: 50%;
      color: #44ff88;
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      transition: all 0.2s;
    }

    .control-btn:active {
      background: rgba(68, 255, 136, 0.4);
      transform: scale(0.95);
    }

    #btnInteract {
      width: 70px;
      height: 70px;
      background: rgba(255, 204, 0, 0.2);
      border-color: #ffcc00;
      color: #ffcc00;
      font-size: 14px;
      font-weight: bold;
    }

    #btnInteract:active {
      background: rgba(255, 204, 0, 0.4);
    }

    #taskPanel::-webkit-scrollbar {
      width: 6px;
    }

    #taskPanel::-webkit-scrollbar-track {
      background: rgba(20, 30, 40, 0.5);
      border-radius: 3px;
    }

    #taskPanel::-webkit-scrollbar-thumb {
      background: #3a5a6a;
      border-radius: 3px;
    }

    #taskPanel::-webkit-scrollbar-thumb:hover {
      background: #4a6a7a;
    }

    @media (max-width: 1024px) {
      #topBar {
        padding: 10px;
        font-size: 10px;
      }

      .status-group {
        gap: 10px;
      }

      .status-item {
        font-size: 9px;
        padding: 4px 8px;
      }

      #roomname {
        font-size: 14px;
      }

      #minimap {
        bottom: 110px;
        right: 15px;
        width: 120px;
        height: 120px;
        transform: none;
      }

      #taskPanel {
        width: calc(100vw - 30px);
        right: 15px;
        top: 60px;
        max-height: 250px;
      }

      #fpsCounter {
        display: none;
      }

      #ptrMsg {
        display: none !important;
      }
    }

    /* Mobile Controls Styles */
    #joystickZone {
      position: absolute;
      bottom: 40px;
      left: 40px;
      width: 120px;
      height: 120px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(68, 255, 136, 0.2);
      border-radius: 50%;
      z-index: 60;
      display: none;
    }

    #joystickKnob {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 48px;
      height: 48px;
      background: radial-gradient(circle, rgba(68, 255, 136, 0.6) 0%, rgba(68, 255, 136, 0.2) 100%);
      border: 1px solid #44ff88;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 15px rgba(68, 255, 136, 0.3);
    }

    #lookZone {
      position: absolute;
      inset: 0;
      z-index: 1; /* Lowest in controls to allow others to be clickable */
      pointer-events: all;
      display: none;
      touch-action: none;
    }

    @media (max-width: 1024px) {
      #joystickZone, #lookZone, #btnSprint {
        display: flex;
      }
    }
  </style>
</head>

<body>
  <canvas id="c"></canvas>

  <div id="overlay">
    <h1>⚡ ELECTRICAL TECHNICIAN</h1>
    <p>Professional Facility Simulator<br>Manage power systems, complete maintenance tasks, and keep the facility
      running</p>
    <button id="startBtn">START SHIFT</button>
  </div>

  <div id="hud">
    <div id="topBar">
      <div id="roomname">LOADING...</div>
      <div class="status-group">
        <div class="status-item"><label>MAINS:</label><span id="pMains">OFF</span></div>
        <div class="status-item"><label>GEN:</label><span id="pGen">OFF</span></div>
        <div class="status-item"><label>WKSP:</label><span id="pWork">OFF</span></div>
        <div class="status-item"><label>CTRL:</label><span id="pCtrl">OFF</span></div>
      </div>
      <div id="genStatus"></div>
    </div>

    <div id="fpsCounter">-- fps</div>
    <canvas id="minimap"></canvas>

    <div id="taskPanel">
      <h3>📋 DAILY TASKS [Press T to toggle]</h3>
      <div id="taskList"></div>
    </div>

    <div id="notification"></div>
    <div id="prompt"></div>
    <div id="ptrMsg">Click to lock pointer • WASD to move • E to interact • ESC to unlock</div>
  </div>

  <div id="controls">
    <div id="lookZone"></div>
    <div id="joystickZone">
      <div id="joystickKnob"></div>
    </div>
    <button id="btnSprint">RUN</button>
    <div class="control-pad">
      <button class="control-btn" id="btnJump">⬆<br>JUMP</button>
      <button class="control-btn" id="btnInteract">⚡<br>USE</button>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
    }
  }
  </script>
  <script type="module" src="./js/main.js"></script>
</body>

</html>
