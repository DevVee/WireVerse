<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>⚡ ElecTrain 3D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Courier New', monospace;
            touch-action: none
        }

        #c {
            display: block;
            width: 100%;
            height: 100%
        }

        /* ── OVERLAY ── */
        #overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #07090f, #0d1520);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            color: #e8d5a3
        }

        #overlay h1 {
            font-size: clamp(28px, 8vw, 54px);
            font-weight: 900;
            letter-spacing: .1em;
            color: #f0c060;
            text-shadow: 0 0 40px #f0c06088;
            margin-bottom: 6px
        }

        #overlay .sub {
            font-size: 11px;
            color: #4466aa;
            letter-spacing: .2em;
            margin-bottom: 32px
        }

        #startBtn {
            background: #f0c060;
            color: #070910;
            border: none;
            padding: 18px 52px;
            font-size: 15px;
            font-weight: 800;
            letter-spacing: .15em;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            text-transform: uppercase;
            transition: all .2s
        }

        #startBtn:active {
            transform: scale(.97);
            background: #ffd270
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #111825;
            border: 1px solid #223;
            border-radius: 4px;
            padding: 5px 14px;
            font-size: 11px;
            color: #5588bb;
            letter-spacing: .15em;
            margin-bottom: 10px
        }

        /* ── HUD ── */
        #hud {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 10;
            display: none
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 22px;
            height: 22px
        }

        #crosshair::before,
        #crosshair::after {
            content: '';
            position: absolute;
            background: #fff;
            opacity: .75
        }

        #crosshair::before {
            width: 2px;
            height: 22px;
            left: 10px;
            top: 0
        }

        #crosshair::after {
            width: 22px;
            height: 2px;
            top: 10px;
            left: 0
        }

        #topbar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(180deg, #000a, transparent);
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 12px
        }

        #logo {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: .12em;
            color: #f0c060
        }

        #roomname {
            font-size: 11px;
            color: #6699cc;
            padding: 3px 10px;
            background: #1a2233cc;
            border: 1px solid #334;
            border-radius: 20px;
            letter-spacing: .08em
        }

        #pwrdot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #44ff88;
            box-shadow: 0 0 6px #44ff88;
            animation: pulse 2s infinite;
            margin-left: auto
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .3
            }
        }

        #notification {
            position: absolute;
            top: 68px;
            left: 50%;
            transform: translateX(-50%);
            background: #000c;
            border: 1px solid #334;
            color: #e8d5a3;
            padding: 8px 20px;
            border-radius: 6px;
            font-size: 12px;
            display: none;
            backdrop-filter: blur(6px);
            max-width: 80vw;
            text-align: center;
            pointer-events: none
        }

        #prompt {
            position: absolute;
            bottom: 210px;
            left: 50%;
            transform: translateX(-50%);
            background: #f0c06022;
            border: 1px solid #f0c06055;
            color: #f0c060;
            padding: 8px 22px;
            border-radius: 24px;
            font-size: 13px;
            display: none;
            white-space: nowrap;
            pointer-events: none
        }

        #objective {
            position: absolute;
            top: 68px;
            left: 12px;
            background: #0a0e1acc;
            border: 1px solid #223355;
            color: #99bbdd;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 11px;
            line-height: 1.6;
            max-width: 200px
        }

        #objective .obj-title {
            color: #f0c060;
            font-size: 10px;
            letter-spacing: .1em;
            margin-bottom: 3px
        }

        /* ── TOUCH CONTROLS ── */
        #controls {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 200px;
            pointer-events: none;
            z-index: 20;
            display: none
        }

        #joystickZone {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 140px;
            height: 140px;
            pointer-events: all
        }

        #joystickBase {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, .06);
            border: 2px solid rgba(255, 255, 255, .15)
        }

        #joystickKnob {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(240, 192, 96, .7);
            border: 2px solid rgba(240, 192, 96, .9);
            transform: translate(-50%, -50%);
            box-shadow: 0 0 12px rgba(240, 192, 96, .4);
            transition: none
        }

        #rightBtns {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            pointer-events: all
        }

        .btn3d {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, .25);
            background: rgba(10, 14, 26, .8);
            color: #e8d5a3;
            font-size: 10px;
            font-family: inherit;
            font-weight: 700;
            letter-spacing: .08em;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            backdrop-filter: blur(4px);
            transition: all .1s;
            -webkit-tap-highlight-color: transparent
        }

        .btn3d span.icon {
            font-size: 20px;
            line-height: 1
        }

        .btn3d:active,
        .btn3d.pressed {
            background: rgba(240, 192, 96, .3);
            border-color: #f0c060;
            box-shadow: 0 0 14px rgba(240, 192, 96, .5)
        }

        #lookZone {
            position: fixed;
            top: 0;
            right: 0;
            bottom: 200px;
            width: 60%;
            z-index: 15;
            pointer-events: all
        }

        /* ── POWER INFO ── */
        #powerPanel {
            position: absolute;
            top: 68px;
            right: 12px;
            background: #0a0e1acc;
            border: 1px solid #223355;
            color: #6699cc;
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 10px;
            line-height: 1.9;
            min-width: 130px
        }

        #powerPanel .pv {
            color: #f0c060;
            float: right;
            margin-left: 8px
        }

        .sep {
            border-top: 1px solid #1a2233;
            margin: 4px 0;
            clear: both
        }
    </style>
</head>

<body>

    <canvas id="c"></canvas>

    <div id="overlay">
        <div class="badge">⚡ ELECTRICAL TRAINING v3.0</div>
        <h1>⚡ ElecTrain</h1>
        <p class="sub">MOBILE FACILITY SIMULATOR</p>
        <button id="startBtn">ENTER FACILITY</button>
        <p style="margin-top:20px;font-size:10px;color:#334455;letter-spacing:.12em">TOUCH-OPTIMISED · SWIPE TO LOOK ·
            JOYSTICK TO MOVE</p>
    </div>

    <div id="hud">
        <div id="crosshair"></div>
        <div id="topbar">
            <div id="logo">⚡ ELECTRAIN</div>
            <div id="roomname">LOBBY</div>
            <div id="pwrdot"></div>
        </div>
        <div id="objective">
            <div class="obj-title">📋 OBJECTIVES</div>
            <div id="objText">Explore the facility.<br>Find switches &amp; panels.<br>Press <b>E</b> or tap ⚡ to
                interact.</div>
        </div>
        <div id="powerPanel">
            MAINS <span class="pv" id="pMains" style="color:#44ff88">ON</span><br>
            WORKSHOP <span class="pv" id="pWork" style="color:#44ff88">ON</span><br>
            LAB <span class="pv" id="pLab" style="color:#44ff88">ON</span><br>
            <div class="sep"></div>
            VOLTAGE <span class="pv">480V</span><br>
            FREQ <span class="pv">60Hz</span>
        </div>
        <div id="notification"></div>
        <div id="prompt">⚡ Tap to interact</div>
    </div>

    <div id="controls">
        <div id="joystickZone">
            <div id="joystickBase"></div>
            <div id="joystickKnob"></div>
        </div>
        <div id="rightBtns">
            <button class="btn3d" id="btnInteract"><span class="icon">⚡</span>ACT</button>
            <button class="btn3d" id="btnSprint"><span class="icon">🏃</span>RUN</button>
        </div>
    </div>
    <div id="lookZone"></div>

    <script
        type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script>
    <script type="module">
        import * as THREE from 'three';

        // ═══════════════════════════════════════════════════════
        //  AUDIO SYSTEM
        // ═══════════════════════════════════════════════════════
        const Audio = (() => {
            let ctx = null;
            function init() { if (!ctx) ctx = new AudioContext(); }
            function tone(freq, type, dur, vol, endFreq) {
                if (!ctx || ctx.state === 'suspended') return;
                const o = ctx.createOscillator(), g = ctx.createGain();
                o.type = type; o.frequency.value = freq;
                if (endFreq) o.frequency.linearRampToValueAtTime(endFreq, ctx.currentTime + dur);
                g.gain.setValueAtTime(vol, ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
                o.connect(g); g.connect(ctx.destination);
                o.start(); o.stop(ctx.currentTime + dur);
            }
            return {
                init,
                click() { tone(700, 'square', .05, .4); setTimeout(() => tone(350, 'square', .04, .2), 25); },
                door(open) { tone(open ? 160 : 280, 'sawtooth', .4, .25, open ? 70 : 180); },
                breaker(on) { tone(on ? 900 : 500, 'square', .08, .5); setTimeout(() => tone(on ? 1100 : 300, 'square', .06, .3), 45); },
                alert() { [0, 140, 280].forEach(d => setTimeout(() => tone(880, 'square', .1, .4), d)); },
                step() { if (ctx && ctx.state !== 'suspended') tone(55 + Math.random() * 30, 'sine', .04, .09); },
                hum() {
                    if (!ctx) return;
                    [60, 120].forEach((f, i) => {
                        const o = ctx.createOscillator(), g = ctx.createGain();
                        o.type = 'sine'; o.frequency.value = f;
                        g.gain.value = i ? 0.018 : 0.045;
                        o.connect(g); g.connect(ctx.destination); o.start();
                    });
                }
            };
        })();

        // ═══════════════════════════════════════════════════════
        //  SCENE SETUP
        // ═══════════════════════════════════════════════════════
        const canvas = document.getElementById('c');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: false, powerPreference: 'high-performance' });
        renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = false; // disabled for mobile perf
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.5;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0d1018);
        scene.fog = new THREE.Fog(0x0d1018, 20, 45);

        const camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.05, 55);
        camera.position.set(0, 1.72, 0);

        // ═══════════════════════════════════════════════════════
        //  MATERIALS
        // ═══════════════════════════════════════════════════════
        const M = {
            concrete: new THREE.MeshLambertMaterial({ color: 0x8899aa }),
            concreteInner: new THREE.MeshLambertMaterial({ color: 0x7a8a9a }),
            floor: new THREE.MeshLambertMaterial({ color: 0x3d4d58 }),
            ceiling: new THREE.MeshLambertMaterial({ color: 0x223344 }),
            door: new THREE.MeshLambertMaterial({ color: 0xcc9966 }),
            doorFrame: new THREE.MeshLambertMaterial({ color: 0x99aabb }),
            panel: new THREE.MeshLambertMaterial({ color: 0x2a4a6a }),
            panelGrey: new THREE.MeshLambertMaterial({ color: 0x5a6a78 }),
            yellow: new THREE.MeshLambertMaterial({ color: 0xf0c060, emissive: new THREE.Color(0xf0c060), emissiveIntensity: .3 }),
            red: new THREE.MeshLambertMaterial({ color: 0xdd4433, emissive: new THREE.Color(0xdd4433), emissiveIntensity: .4 }),
            green: new THREE.MeshLambertMaterial({ color: 0x33dd66, emissive: new THREE.Color(0x33dd66), emissiveIntensity: .5 }),
            bench: new THREE.MeshLambertMaterial({ color: 0x8a7055 }),
            black: new THREE.MeshLambertMaterial({ color: 0x1a1a1a }),
            chrome: new THREE.MeshLambertMaterial({ color: 0xaabbcc }),
            wire: new THREE.MeshLambertMaterial({ color: 0x222222 }),
        };

        // ═══════════════════════════════════════════════════════
        //  GEOMETRY HELPERS
        // ═══════════════════════════════════════════════════════
        function mkBox(w, h, d, mat) {
            const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
            m.castShadow = false; m.receiveShadow = false; return m;
        }
        function add(mesh, x, y, z) { mesh.position.set(x, y, z); scene.add(mesh); return mesh; }
        function addRot(mesh, x, y, z, ry) { mesh.position.set(x, y, z); mesh.rotation.y = ry; scene.add(mesh); return mesh; }

        // ═══════════════════════════════════════════════════════
        //  COLLISION SYSTEM
        // ═══════════════════════════════════════════════════════
        const colBoxes = [];
        function addCol(x, y, z, w, h, d) {
            colBoxes.push(new THREE.Box3(
                new THREE.Vector3(x - w / 2, y - h / 2, z - d / 2),
                new THREE.Vector3(x + w / 2, y + h / 2, z + d / 2)
            ));
        }
        function checkCol(pos) {
            const pb = new THREE.Box3(
                new THREE.Vector3(pos.x - .28, pos.y - 1.65, pos.z - .28),
                new THREE.Vector3(pos.x + .28, pos.y + .05, pos.z + .28)
            );
            return colBoxes.some(b => b.intersectsBox(pb));
        }

        // ═══════════════════════════════════════════════════════
        //  LIGHTING
        // ═══════════════════════════════════════════════════════
        const ambLight = new THREE.AmbientLight(0x99aabb, 1.6);
        scene.add(ambLight);
        const hemi = new THREE.HemisphereLight(0xddeeff, 0x334455, 0.9);
        scene.add(hemi);

        const roomLightSets = {};
        function mkLight(x, y, z, color, intensity, roomKey) {
            const pt = new THREE.PointLight(color, intensity, 18);
            pt.position.set(x, y, z); scene.add(pt);
            // Tube mesh
            const tube = new THREE.Mesh(
                new THREE.CylinderGeometry(.04, .04, 1.2, 6),
                new THREE.MeshBasicMaterial({ color: 0xfff5dd })
            );
            tube.rotation.z = Math.PI / 2; tube.position.set(x, 3.38, z); scene.add(tube);
            if (roomKey) {
                if (!roomLightSets[roomKey]) roomLightSets[roomKey] = [];
                roomLightSets[roomKey].push(pt);
            }
            return pt;
        }

        const H = 3.5, WT = 0.22;

        // ═══════════════════════════════════════════════════════
        //  BUILDING LAYOUT  (non-symmetrical, offset rooms)
        // ═══════════════════════════════════════════════════════
        /*
          Layout (top-down, Z+ = forward/north):
          ┌─────────────────────────────────────────┐
          │  Storage (14×10)  │ Util (8×8)          │
          │  x:-16→-2         │ x:2→10              │
          │  z: 4→14          │ z: 6→14             │
          ├───────┬───────────┴──┬──────────────────┤
          │       │  Hall (5w)   │                  │
          │       │  x:-2→3      │  Control(14×9)   │
          │Narrow │  z:-18→14    │  x:3→17 z:3→12  │
          │Corr.  ├──────────────┤                  │
          │(3w)   │              ├──────────────────┤
          │x:-8→-5│              │  Workshop(16×12) │
          │z:-10→2│              │  x:3→19 z:-14→-2 │
          │       │              │                  │
          └───────┴──────────────┴──────────────────┘
        */

        function mkFloor(cx, cz, w, d) {
            const fl = new THREE.Mesh(new THREE.PlaneGeometry(w, d), M.floor);
            fl.rotation.x = -Math.PI / 2; fl.position.set(cx, .001, cz); scene.add(fl);
            const cl = new THREE.Mesh(new THREE.PlaneGeometry(w, d), M.ceiling);
            cl.rotation.x = Math.PI / 2; cl.position.set(cx, H, cz); scene.add(cl);
        }
        function mkWall(x, y, z, w, h, d, mat) {
            const wl = mkBox(w, h, d, mat || M.concreteInner);
            wl.position.set(x, y, z); scene.add(wl);
            addCol(x, y, z, w, h, d);
        }

        // Floors & ceilings per room
        mkFloor(0.5, -2, 5, 32);      // Hall
        mkFloor(-9, -4, 3, 12);       // Narrow corridor
        mkFloor(11, -8, 16, 12);      // Workshop
        mkFloor(10, 7.5, 14, 9);      // Control room
        mkFloor(-9, 9, 14, 10);       // Storage
        mkFloor(6, 10, 8, 8);         // Utility closet

        // ── OUTER WALLS ──
        // North
        mkWall(-3, H / 2, -19.1, 10, H, WT, M.concrete);  // hall N
        mkWall(-9.5, H / 2, -10.9, 3, H, WT, M.concrete);   // narrow corridor N
        mkWall(11, H / 2, -14.1, 16, H, WT, M.concrete);    // workshop N  → south wall
        // South outer wall (across rooms)
        mkWall(0, H / 2, 14.1, 26, H, WT, M.concrete);
        // East outer wall
        mkWall(19.1, H / 2, -4, WT, H, 18, M.concrete);
        // West outer wall
        mkWall(-11.1, H / 2, -4, WT, H, 18, M.concrete);

        // ── INNER WALLS (with door openings) ──
        // Wall between hall and workshop (east wall x=3, z=-18 to -2)
        function wallWithDoor(x1, z1, x2, z2, axis, doorZ, doorW, isX) {
            if (isX) { // vertical wall (varies in Z)
                const segs = segmentize(z1, z2, doorZ, doorW);
                segs.forEach(s => {
                    const len = s[1] - s[0];
                    if (s[2]) return; // door opening — just lintel
                    const lintel = mkBox(WT, H - 2.2, len, M.concreteInner);
                    lintel.position.set(x1, 2.2 + (H - 2.2) / 2, (s[0] + s[1]) / 2); scene.add(lintel);
                });
                segs.forEach(s => {
                    if (!s[2]) {
                        const len = s[1] - s[0];
                        const wl = mkBox(WT, H, len, M.concreteInner);
                        wl.position.set(x1, H / 2, (s[0] + s[1]) / 2); scene.add(wl); addCol(x1, H / 2, (s[0] + s[1]) / 2, WT, H, len);
                    }
                });
            } else { // horizontal wall (varies in X)
                const segs = segmentize(x1, x2, doorZ, doorW);
                segs.forEach(s => {
                    const len = s[1] - s[0];
                    if (!s[2]) {
                        const wl = mkBox(len, H, WT, M.concreteInner);
                        wl.position.set((s[0] + s[1]) / 2, H / 2, z1); scene.add(wl); addCol((s[0] + s[1]) / 2, H / 2, z1, len, H, WT);
                    } else {
                        const lintel = mkBox(len, H - 2.2, WT, M.concreteInner);
                        lintel.position.set((s[0] + s[1]) / 2, 2.2 + (H - 2.2) / 2, z1); scene.add(lintel);
                    }
                });
            }
        }
        function segmentize(min, max, doorMid, doorW) {
            const d0 = doorMid - doorW / 2, d1 = doorMid + doorW / 2;
            const segs = [];
            if (d0 > min) segs.push([min, d0, false]);
            segs.push([d0, d1, true]);
            if (d1 < max) segs.push([d1, max, false]);
            return segs;
        }

        // East hall wall → workshop at z=-8, → control at z=7
        wallWithDoor(3, -14, 3, -2, 'x', -8, 1.1, true);    // workshop door opening
        wallWithDoor(3, 3, 3, 12, 'x', 7, 1.1, true);       // control door opening

        // West hall wall → narrow corridor at z=-4
        wallWithDoor(-2, -10, -2, 2, 'x', -4, 1.1, true);   // narrow corridor door
        wallWithDoor(-2, 2, -2, 14, 'x', 9, 1.1, true);     // storage door

        // Narrow corridor west wall x=-8 (from z=-10 to z=2)
        mkWall(-8.1, H / 2, -4, WT, H, 12, M.concreteInner);
        // Narrow corridor north wall z=-10 (from x=-8 to x=-2)
        mkWall(-5, H / 2, -10.1, 6, H, WT, M.concreteInner);
        // Narrow corridor south → opens to south outer
        mkWall(-5, H / 2, 2.1, 6, H, WT, M.concreteInner);

        // Workshop south z=-14 already outer, east x=19 outer
        // Workshop north wall z=-2 (connects to hall)
        mkWall(11, H / 2, -2.1, 16, H, WT, M.concreteInner); // solid — door in east hall wall handles it

        // Control room south z=3 (x=3 to 17)
        mkWall(10, H / 2, 3.1, 14, H, WT, M.concreteInner);
        // Control room north z=12
        mkWall(10, H / 2, 12.1, 14, H, WT, M.concreteInner);

        // Storage west x=-16 (z=4 to 14)
        mkWall(-16.1, H / 2, 9, WT, H, 10, M.concrete);
        // Storage east x=-2 (z=4 to 14) — hall wall with door

                panel.userData = { type: 'door', door: this };
                knob.userData = { type: 'door', door: this };
                allInteractables.push(panel, knob);
                this.panel = panel;
                this._syncCol();
            }
            _syncCol() {
                if (this._colIdx !== undefined) colBoxes.splice(this._colIdx, 1);
                if (!this.open) {
                    const p = this.pivot.position;
                    const ry = this.pivot.userData.baseRotY;
                    const cx = p.x + Math.cos(ry) * .525;
                    const cz = p.z + Math.sin(ry) * .525;
                    this._colIdx = colBoxes.length;
                    colBoxes.push(new THREE.Box3(
                        new THREE.Vector3(cx - .6, 0, cz - .08),
                        new THREE.Vector3(cx + .6, 2.3, cz + .08)
                    ));
                } else { this._colIdx = undefined; }
            }
            toggle() {
                this.open = !this.open;
                this.target = this.open ? -Math.PI * .72 : 0;
                Audio.door(this.open);
                notify(this.open ? `🚪 ${this.label} — Opened` : `🚪 ${this.label} — Closed`);
                this._syncCol();
            }
            update(dt) {
                const diff = this.target - this.angle;
                if (Math.abs(diff) > .001) {
                    this.angle += diff * Math.min(1, dt * 9);
                    this.pivot.rotation.y = this.pivot.userData.baseRotY + this.angle;
                }
            }
        }

        const joystickZone = document.getElementById('joystickZone');

        let jsTouch = null, jsCenter = { x: 70, y: 70 }, jsVec = { x: 0, y: 0 };

        let lookTouches = {}; // id -> {x,y}
        let lookDelta = { x: 0, y: 0 };

        // Joystick
        joystickZone.addEventListener('touchstart', e => {
            e.preventDefault();
            const t = e.changedTouches[0];
            jsTouch = t.identifier;
            const r = joystickZone.getBoundingClientRect();
            jsCenter = { x: r.left + r.width / 2, y: r.top + r.height / 2 };
        }, { passive: false });

        joystickZone.addEventListener('touchmove', e => {
            e.preventDefault();
            for (const t of e.changedTouches) {
                if (t.identifier === jsTouch) {
                    let dx = t.clientX - jsCenter.x, dy = t.clientY - jsCenter.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist > JRADIUS) { dx = dx / dist * JRADIUS; dy = dy / dist * JRADIUS; }
                    jsVec.x = dx / JRADIUS; jsVec.y = dy / JRADIUS;
                    knob.style.left = (50 + jsVec.x * 38) + '%';
                    knob.style.top = (50 + jsVec.y * 38) + '%';

        }, { passive: false });

        function getRoom(p) {
            if (p.x > 3 && p.z < -2) return '🔧 WORKSHOP';
            if (p.x > 3 && p.z > 3) return '🎛 CONTROL ROOM';
            if (p.x < -2 && p.z > 3) return '📦 STORAGE';
            if (p.x < -5 && p.z > -10 && p.z < 2) return '🔌 CORRIDOR';

        // ═══════════════════════════════════════════════════════
        //  MAIN LOOP
        // ═══════════════════════════════════════════════════════
        const clock = new THREE.Clock();
        let animT = 0;

        function update(dt) {
            // ── Look ─────────────────────────────────────────────
            const LOOK_SENS = 0.0038;
            Player.yaw -= lookDelta.x * LOOK_SENS;
            Player.pitch -= lookDelta.y * LOOK_SENS;
            Player.pitch = Math.max(-1.1, Math.min(1.1, Player.pitch));
            lookDelta.x = 0; lookDelta.y = 0;

            // Keyboard look
            if (keys['ArrowLeft']) Player.yaw += dt * 1.8;
            if (keys['ArrowRight']) Player.yaw -= dt * 1.8;

            camera.rotation.order = 'YXZ';
            camera.rotation.y = Player.yaw;
            camera.rotation.x = Player.pitch;

            // ── Movement ──────────────────────────────────────────
            const maxSpd = Player.sprinting ? Player.SPRINT_SPEED : Player.SPEED;
            const fwd = new THREE.Vector3(-Math.sin(Player.yaw), 0, -Math.cos(Player.yaw));
            const rgt = new THREE.Vector3(Math.cos(Player.yaw), 0, -Math.sin(Player.yaw));

            let wx = 0, wy = 0;
            // Joystick
            const DEAD = 0.12;
            if (Math.abs(jsVec.x) > DEAD || Math.abs(jsVec.y) > DEAD) {
                wx = jsVec.x; wy = jsVec.y;
            }
            // Keyboard
            if (keys['KeyW'] || keys['ArrowUp']) wy = -1;
            if (keys['KeyS'] || keys['ArrowDown']) wy = 1;
            if (keys['KeyA']) wx = -1;
            if (keys['KeyD']) wx = 1;
            if (keys['ShiftLeft']) Player.sprinting = true;
            else if (!keys['ShiftLeft'] && !keys['ShiftRight']) Player.sprinting = false;

            let wish = new THREE.Vector3();
            wish.addScaledVector(fwd, -wy);
            wish.addScaledVector(rgt, wx);
            if (wish.lengthSq() > 0) wish.normalize();

            const ACCEL = 24, DECEL = 20;
            if (wish.lengthSq() > 0) {
                Player.vel.addScaledVector(wish, ACCEL * dt);
                if (Player.vel.length() > maxSpd) Player.vel.normalize().multiplyScalar(maxSpd);
            } else {
                const spd = Player.vel.length();
                if (spd > 0.01) Player.vel.multiplyScalar(Math.max(0, 1 - DECEL * dt / spd));
                else Player.vel.set(0, 0, 0);
            }

            // Collision
            const np = Player.pos.clone().add(Player.vel.clone().multiplyScalar(dt));
            np.x = Math.max(-15.8, Math.min(18.8, np.x));
            np.z = Math.max(-17.8, Math.min(13.8, np.z));
            if (!checkCol(np)) {
                Player.pos.copy(np);
            } else {
                const tx = new THREE.Vector3(np.x, Player.pos.y, Player.pos.z);
                if (!checkCol(tx)) { Player.pos.x = np.x; Player.vel.z = 0; }
                const tz = new THREE.Vector3(Player.pos.x, Player.pos.y, np.z);
                if (!checkCol(tz)) { Player.pos.z = np.z; Player.vel.x = 0; }
            }

            // ── Head bob ─────────────────────────────────────────
            const spd2 = Player.vel.length();
            const isMoving = spd2 > 0.15;
            const bobSpd = Player.sprinting ? 10 : 7;
            if (isMoving) {
                Player.bobT += dt * bobSpd * (spd2 / maxSpd);
                Player.bobAmt = Math.min(1, Player.bobAmt + dt * 6);
            } else {
                Player.bobAmt = Math.max(0, Player.bobAmt - dt * 5);
            }
            const bobY = Math.sin(Player.bobT) * .028 * Player.bobAmt;
            Player.pos.y = Player.BASE_Y + bobY;

            // Footstep
            const prevBob = Math.sin(Player.bobT - dt * bobSpd);
            if (Player.bobAmt > .5 && Math.sin(Player.bobT) < 0 && prevBob >= 0) Audio.step();

            camera.position.copy(Player.pos);

            // ── Raycasting ───────────────────────────────────────
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const all = [...allInteractables, ...doors.map(d => d.panel)];
            const hits = raycaster.intersectObjects(all, true);
            const promptEl = document.getElementById('prompt');
            if (hits.length && hits[0].distance < 3.0) {
                const obj = hits[0].object;
                // Walk up to find interactable
                let cur = obj;
                while (cur && !cur.userData?.type) cur = cur.parent;
                if (cur?.userData?.type) {
                    focusedObj = cur;
                    const ud = cur.userData;
                    if (ud.type === 'door') promptEl.textContent = `⚡ ${ud.door?.label || 'Door'}`;
                    else promptEl.textContent = `⚡ ${ud.label || 'Interact'}`;
                    promptEl.style.display = 'block';
                } else { focusedObj = null; promptEl.style.display = 'none'; }
            } else { focusedObj = null; promptEl.style.display = 'none'; }

            // ── HUD updates ───────────────────────────────────────
            document.getElementById('roomname').textContent = getRoom(Player.pos);

            // Warn strobe
            if (warnLight.intensity > .5) warnLight.intensity = Math.sin(animT * 6) > .0 ? 1.4 : .1;

            // Light flicker atmosphere
            if (ElecState.mains && Math.random() < .0008) {
                const hallLts = roomLightSets['hall'];
                if (hallLts) {
                    const l = hallLts[Math.floor(Math.random() * hallLts.length)];
                    const orig = l.intensity; l.intensity = orig * .25;
                    setTimeout(() => l.intensity = orig, 70);
                }
            }

            // Doors update
            doors.forEach(d => d.update(dt));
        }

        function render() {
            renderer.render(scene, camera);
        }

        function loop() {
            requestAnimationFrame(loop);
            const dt = Math.min(clock.getDelta(), .05);
            animT += dt;
            update(dt);
            render();
        }

        // ═══════════════════════════════════════════════════════
        //  START
        // ═══════════════════════════════════════════════════════
        document.getElementById('startBtn').addEventListener('click', () => {
            Audio.init(); Audio.hum();
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            document.getElementById('controls').style.display = 'block';
            applyPower();
            loop();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
